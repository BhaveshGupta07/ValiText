{% extends "user/user_base.html" %}

{% block content %}

<div class="glass-card max-w-4xl mx-auto">

<form method="post">
{% csrf_token %}

<h2 class="text-lg font-semibold mb-6">{{ job.name }}</h2>

{% for s in sentences %}

<div class="mb-6 border-b pb-4">

    <p class="text-xs text-gray-500">Source</p>
    <p class="font-medium">{{ s.src_sentence }}</p>

    <p class="text-xs text-gray-500 mt-2">Model Translation</p>
    <p id="mt-{{ forloop.counter }}">{{ s.tgt_sentence }}</p>

    <textarea name="{{ s.sentence_id }}"
              class="finalText w-full border rounded p-2 mt-2"
              data-id="{{ forloop.counter }}">{{ s.tgt_sentence }}</textarea>

    <div class="diffOutput mt-2 text-sm"></div>

</div>

{% endfor %}

<button class="bg-purple-600 text-white px-4 py-2 rounded">
    Submit All
</button>

</form>

</div>


<script>
document.querySelectorAll(".finalText").forEach((textarea, index) => {

    const mt = document.getElementById("mt-" + (index+1)).innerText;
    const output = textarea.parentElement.querySelector(".diffOutput");

    function highlightDiff(original, edited) {
        const o = original.split(" ");
        const e = edited.split(" ");
        let res = "";

        e.forEach((w, i) => {
            if (o[i] !== w) {
                res += `<span style="color:red">${w}</span> `;
            } else {
                res += w + " ";
            }
        });

        return res;
    }

    textarea.addEventListener("input", () => {
        output.innerHTML = highlightDiff(mt, textarea.value);
    });

    output.innerHTML = highlightDiff(mt, textarea.value);
});
</script>

{% endblock %}
